services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revenue_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - revenue_network
    depends_on:
      - redis
    # Override produzione nel .env montato: stack locale = solo HTTP su :8080
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      ASSET_URL: http://localhost:8080
      SESSION_SECURE_COOKIE: "false"

  nginx:
    image: nginx:alpine
    container_name: revenue_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - revenue_network
    depends_on:
      app:
        condition: service_started
        required: false

  # DB MySQL esterno: .env con DB_HOST punta al server DB; nessun container mysql nello stack.

  redis:
    image: redis:7.4-alpine
    container_name: revenue_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - revenue_network

networks:
  revenue_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
